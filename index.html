<!DOCTYPE html>
<html>
<head>
  <title>Qeecko AI</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 900px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    .primary { background: #6366f1; color: white; }
    .secondary { background: #334155; color: white; }

    .image-wrapper {
      position: relative;
      margin-top: 20px;
    }

    #image {
      width: 100%;
      border-radius: 10px;
      opacity: 0;
      transition: opacity 0.5s;
    }

    #image.show { opacity: 1; }

    #placeholder {
      position: absolute;
      inset: 0;
      background: #475569;
      filter: blur(10px);
      display: none;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 10px;
      margin-top: 20px;
    }

    .gallery img {
      width: 100%;
      border-radius: 8px;
      cursor: pointer;
    }

    .suggestions-box {
      background: #1e293b;
      border-radius: 8px;
      display: none;
    }

    .suggestion-item {
      padding: 8px;
      cursor: pointer;
    }

    .suggestion-item:hover {
      background: #334155;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- AUTH -->
  <div id="auth" class="card">
    <h2>Login to Qeecko</h2>

    <input id="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />

    <button class="primary" onclick="signUp()">Sign Up</button>
    <button class="secondary" onclick="login()">Login</button>

    <p id="authStatus"></p>
  </div>

  <!-- APP -->
  <div id="app" style="display:none;">

    <div class="card">
      <h2>🚀 Qeecko AI Generator</h2>

      <button onclick="logout()">Logout</button>

      <input id="prompt" placeholder="Describe your image..." oninput="showSuggestions()" />
      <div id="suggestions" class="suggestions-box"></div>

      <select id="style">
        <option value="">Default</option>
        <option value="cinematic">Cinematic</option>
        <option value="anime">Anime</option>
        <option value="realistic">Realistic</option>
        <option value="fantasy">Fantasy</option>
        <option value="cyberpunk">Cyberpunk</option>
      </select>

      <button class="primary" onclick="generate()">Generate</button>
      <button class="secondary" onclick="enhancePrompt()">✨ Enhance</button>
      <button id="downloadBtn" onclick="downloadImage()" style="display:none;">⬇ Download</button>

      <div class="image-wrapper">
        <img id="image" />
        <div id="placeholder"></div>
      </div>
    </div>

    <h3>History</h3>
    <div id="gallery" class="gallery"></div>

  </div>

</div>

<script>

// =========================
// 🔑 INSERT YOUR KEYS HERE
// =========================
const supabaseUrl = "https://mfimqzwkcoiwsvfqurep.supabase.co";
const supabaseKey = "sb_publishable_N_dMUbzlo3LTJyDqmTwWYw_NM15fAEW";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);


// =========================
// AUTH
// =========================
async function signUp() {
  const email = emailEl.value;
  const password = passwordEl.value;

  const { error } = await supabase.auth.signUp({ email, password });

  authStatus.innerText = error ? error.message : "Check your email!";
}

async function login() {
  const email = emailEl.value;
  const password = passwordEl.value;

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) {
    authStatus.innerText = error.message;
    return;
  }

  showApp();
}

async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

async function checkUser() {
  const { data } = await supabase.auth.getUser();
  if (data.user) showApp();
}

function showApp() {
  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "block";
}


// =========================
// GENERATE IMAGE
// =========================
async function generate() {
  const { data } = await supabase.auth.getUser();
  if (!data.user) return alert("Login first");

  const prompt = promptEl.value;

  placeholder.style.display = "block";
  image.classList.remove("show");

  const res = await fetch("/generate-image", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ prompt })
  });

  const dataRes = await res.json();
  const img = dataRes.data?.[0]?.url || `data:image/png;base64,${dataRes.data?.[0]?.b64_json}`;

  image.src = img;
  saveToHistory(img);

  image.onload = () => {
    placeholder.style.display = "none";
    image.classList.add("show");
    downloadBtn.style.display = "block";
  };
}


// =========================
// ENHANCE
// =========================
async function enhancePrompt() {
  const res = await fetch("/enhance-prompt", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ input: promptEl.value, style: style.value })
  });

  const data = await res.json();
  promptEl.value = data.enhanced;
}


// =========================
// SUGGESTIONS
// =========================
let timer;
function showSuggestions() {
  clearTimeout(timer);

  timer = setTimeout(async () => {
    const res = await fetch("/suggest-prompts", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ input: promptEl.value })
    });

    const data = await res.json();
    suggestions.innerHTML = "";

    data.suggestions.forEach(s => {
      const div = document.createElement("div");
      div.className = "suggestion-item";
      div.innerText = s;
      div.onclick = () => {
        promptEl.value = s;
        suggestions.style.display = "none";
      };
      suggestions.appendChild(div);
    });

    suggestions.style.display = "block";
  }, 300);
}


// =========================
// DOWNLOAD
// =========================
async function downloadImage() {
  const res = await fetch(image.src);
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "qeecko.png";
  a.click();
}


// =========================
// HISTORY
// =========================
function saveToHistory(img) {
  let h = JSON.parse(localStorage.getItem("h")) || [];
  h.unshift(img);
  localStorage.setItem("h", JSON.stringify(h));
  renderGallery();
}

function renderGallery() {
  const h = JSON.parse(localStorage.getItem("h")) || [];
  gallery.innerHTML = "";
  h.forEach(src => {
    const img = document.createElement("img");
    img.src = src;
    img.onclick = () => image.src = src;
    gallery.appendChild(img);
  });
}


// =========================
// INIT
// =========================
const emailEl = document.getElementById("email");
const passwordEl = document.getElementById("password");
const authStatus = document.getElementById("authStatus");
const promptEl = document.getElementById("prompt");
const suggestions = document.getElementById("suggestions");
const image = document.getElementById("image");
const placeholder = document.getElementById("placeholder");
const gallery = document.getElementById("gallery");
const downloadBtn = document.getElementById("downloadBtn");

checkUser();
renderGallery();

</script>

</body>
</html>
