<!DOCTYPE html>
<html>
<head>
  <title>Qeecko AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 900px;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-bottom: 10px;
      font-size: 14px;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin-right: 10px;
    }

    .primary {
      background: #6366f1;
      color: white;
    }

    .secondary {
      background: #334155;
      color: white;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .image-wrapper {
      margin-top: 20px;
      position: relative;
    }

    #image {
      width: 100%;
      border-radius: 10px;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    #image.show {
      opacity: 1;
    }

    #placeholder {
      position: absolute;
      inset: 0;
      background: #475569;
      filter: blur(10px);
      animation: pulse 1.5s infinite;
      border-radius: 10px;
      display: none;
    }

    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }

    #downloadBtn {
      margin-top: 10px;
      display: none;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 10px;
      margin-top: 20px;
    }

    .gallery img {
      width: 100%;
      border-radius: 8px;
      cursor: pointer;
    }

    .suggestions-box {
      background: #1e293b;
      border-radius: 8px;
      margin-top: 5px;
      display: none;
    }

    .suggestion-item {
      padding: 10px;
      cursor: pointer;
    }

    .suggestion-item:hover {
      background: #334155;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🚀 Qeecko AI Generator</h1>

  <div class="card">

    <input id="prompt" placeholder="Describe your image..." oninput="showSuggestions()" />
    <div id="suggestions" class="suggestions-box"></div>

    <select id="style">
      <option value="">Default</option>
      <option value="cinematic">Cinematic</option>
      <option value="anime">Anime</option>
      <option value="realistic">Realistic</option>
      <option value="fantasy">Fantasy</option>
      <option value="cyberpunk">Cyberpunk</option>
    </select>

    <div class="row">
      <button class="primary" onclick="generate()">Generate</button>
      <button class="secondary" onclick="enhancePrompt()">✨ Enhance</button>
      <button class="secondary" onclick="downloadImage()" id="downloadBtn">⬇ Download</button>
    </div>

    <div class="image-wrapper">
      <img id="image" />
      <div id="placeholder"></div>
    </div>

  </div>

  <h2>History</h2>
  <div id="gallery" class="gallery"></div>

</div>

<script>

// =========================
// GLOBALS
// =========================
let debounceTimer;


// =========================
// GENERATE IMAGE
// =========================
async function generate() {
  const prompt = document.getElementById("prompt").value;
  const imageEl = document.getElementById("image");
  const placeholder = document.getElementById("placeholder");
  const downloadBtn = document.getElementById("downloadBtn");

  if (!prompt) {
    alert("Please enter a prompt");
    return;
  }

  // UI reset
  imageEl.classList.remove("show");
  imageEl.src = "";
  placeholder.style.display = "block";
  downloadBtn.style.display = "none";

  try {
    const res = await fetch("/generate-image", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();
    console.log("GEN RESPONSE:", data);

    if (!res.ok) {
      alert(data.error || "Generation failed");
      placeholder.style.display = "none";
      return;
    }

    const imageUrl = data.data?.[0]?.url;
    const base64 = data.data?.[0]?.b64_json;

    const finalImage = imageUrl || (base64 ? `data:image/png;base64,${base64}` : null);

    if (!finalImage) {
      alert("No image returned");
      placeholder.style.display = "none";
      return;
    }

    imageEl.src = finalImage;

	// 👉 SAVE IMMEDIATELY (reliable)
	saveToHistory(finalImage);

	// UI effects
	imageEl.onload = () => {
	  placeholder.style.display = "none";
	  imageEl.classList.add("show");
	  downloadBtn.style.display = "inline-block";
	};

  } catch (err) {
    console.error("ERROR:", err);
    alert("Network error: " + err.message);
    placeholder.style.display = "none";
  }
}


// =========================
// PROMPT ENHANCER
// =========================
async function enhancePrompt() {
  const inputEl = document.getElementById("prompt");
  const prompt = inputEl.value;
  const style = document.getElementById("style").value;

  if (!prompt) {
    alert("Enter a prompt first");
    return;
  }

  inputEl.value = "Enhancing... ✨";

  try {
    const res = await fetch("/enhance-prompt", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ input: prompt, style })
    });

    const data = await res.json();

    if (!data.enhanced) {
      inputEl.value = prompt;
      alert("Enhancement failed");
      return;
    }

    inputEl.value = data.enhanced;

  } catch (err) {
    console.error(err);
    inputEl.value = prompt;
    alert("Error enhancing prompt");
  }
}


// =========================
// AI SUGGESTIONS (DEBOUNCED)
// =========================
async function showSuggestions() {
  const input = document.getElementById("prompt").value;
  const box = document.getElementById("suggestions");

  clearTimeout(debounceTimer);

  if (!input) {
    box.style.display = "none";
    return;
  }

  debounceTimer = setTimeout(async () => {
    try {
      const res = await fetch("/suggest-prompts", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ input })
      });

      const data = await res.json();
      const suggestions = data.suggestions || [];

      box.innerHTML = "";

      if (suggestions.length === 0) {
        box.style.display = "none";
        return;
      }

      suggestions.forEach(item => {
        const div = document.createElement("div");
        div.className = "suggestion-item";
        div.textContent = item;

        div.onclick = () => {
          document.getElementById("prompt").value = item;
          box.style.display = "none";
        };

        box.appendChild(div);
      });

      box.style.display = "block";

    } catch (err) {
      console.error("Suggestion error:", err);
    }
  }, 400);
}


// =========================
// DOWNLOAD IMAGE
// =========================
async function downloadImage() {
  const img = document.getElementById("image");

  if (!img.src) {
    alert("No image to download");
    return;
  }

  try {
    const response = await fetch(img.src);
    const blob = await response.blob();

    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "qeecko-image.png";
    document.body.appendChild(a);
    a.click();
    a.remove();

    window.URL.revokeObjectURL(url);
  } catch (err) {
    console.error(err);
    alert("Download failed");
  }
}


// =========================
// IMAGE HISTORY
// =========================
function saveToHistory(imageUrl) {
  let history = JSON.parse(localStorage.getItem("imageHistory")) || [];

  history.unshift(imageUrl);
  history = history.slice(0, 20);

  localStorage.setItem("imageHistory", JSON.stringify(history));
  renderGallery();
}

function renderGallery() {
  const gallery = document.getElementById("gallery");
  const history = JSON.parse(localStorage.getItem("imageHistory")) || [];

  gallery.innerHTML = "";

  history.forEach(src => {
    const img = document.createElement("img");
    img.src = src;

    img.onclick = () => {
      const main = document.getElementById("image");
      main.src = src;
      main.classList.add("show");
    };

    gallery.appendChild(img);
  });
}


// =========================
// CLOSE SUGGESTIONS ON CLICK OUTSIDE
// =========================
document.addEventListener("click", (e) => {
  const box = document.getElementById("suggestions");
  const input = document.getElementById("prompt");

  if (!box.contains(e.target) && e.target !== input) {
    box.style.display = "none";
  }
});


// =========================
// INIT
// =========================
window.onload = () => {
  renderGallery();
};
</script>

</body>
</html>
