<!DOCTYPE html>
<html>
<head>
  <title>Qeecko AI Generator</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 40px; }
    input { width: 300px; padding: 10px; }
    button { padding: 10px 20px; margin-left: 10px; }
    img { margin-top: 20px; max-width: 100%; }
	#image {
	  opacity: 0;
	  transition: opacity 0.6s ease-in-out;
	}

	#image.show {
	  opacity: 1;
	}	
	.spinner {
	  width: 40px;
	  height: 40px;
	  border: 5px solid #ccc;
	  border-top: 5px solid #333;
	  border-radius: 50%;
	  animation: spin 1s linear infinite;
	  margin: auto;
	}

	@keyframes spin {
	  0% { transform: rotate(0deg); }
	  100% { transform: rotate(360deg); }
	}

	#loader {
	  text-align: center;
	}	
	
.image-wrapper {
  position: relative;
  width: 100%;
  max-width: 512px;
  margin: 20px auto;
}

#image {
  width: 100%;
  display: block;
  opacity: 0;
  transition: opacity 0.6s ease-in-out;
  position: relative;
  z-index: 2;
}

#image.show {
  opacity: 1;
}

/* Blur placeholder */
#placeholder {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  aspect-ratio: 1 / 1;
  background: #ddd;
  filter: blur(12px);
  animation: pulse 1.5s infinite;
  z-index: 1;
  display: none;
}

/* subtle pulsing effect */
@keyframes pulse {
  0% { opacity: 0.6; }
  50% { opacity: 1; }
  100% { opacity: 0.6; }
}	
  </style>
</head>
<body>

  <h1>Qeecko AI Image Generator</h1>

  <input id="prompt" placeholder="Enter prompt..." />
  <button onclick="generate()">Generate</button>

	<div id="loader" style="display:none; margin-top:20px;">
	  <div class="spinner"></div>
	  <p>Generating image...</p>
	</div>
	
	<div class="image-wrapper">
	  <img id="image" />
	  <div id="placeholder"></div>
	</div>

  <script>
async function generate() {
  const prompt = document.getElementById("prompt").value;
  const imageEl = document.getElementById("image");
  const placeholder = document.getElementById("placeholder");

  if (!prompt) {
    alert("Please enter a prompt");
    return;
  }

  // 👉 SHOW BLUR PLACEHOLDER
  placeholder.style.display = "block";

  // reset image
  imageEl.classList.remove("show");
  imageEl.src = "";

  try {
    const res = await fetch("http://localhost:3000/generate-image", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();
    console.log(data);

    if (!res.ok) {
      alert(data.error || "Failed to generate image");
      return;
    }

    const imageUrl = data.data?.[0]?.url;
    const base64 = data.data?.[0]?.b64_json;

    const finalImage = imageUrl || (base64 ? `data:image/png;base64,${base64}` : null);

    if (!finalImage) {
      alert("No image returned");
      return;
    }

    imageEl.src = finalImage;

    imageEl.onload = () => {
      // hide placeholder
      placeholder.style.display = "none";

      // fade in image
      imageEl.classList.add("show");
    };

  } catch (err) {
    console.error(err);
    alert("Network error");
    placeholder.style.display = "none";
  }
}
  </script>

</body>
</html>
